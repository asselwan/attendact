name: Deploy Noshight

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -X POST "https://coolify.nomoi.ai/api/v1/deploy?uuid=tfggmpvlo6hldl76ntrnzueg" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
